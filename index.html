<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Live Server(5500 등)로 열 때는 API가 없어 404가 납니다. 터미널에서 npm start로 Express(기본 3001)를 켜 두세요. -->
    <!-- API 서버 주소를 바꿨다면: <meta name="api-origin" content="http://127.0.0.1:원하는포트" /> -->
    <title>Now Playing Movies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="intro-active">
    <div id="entry-overlay" class="entry-overlay">
      <div class="entry-panel">
        <p class="entry-eyebrow">WELCOME TO</p>
        <h1 class="entry-logo">Mr. MOON FLIX</h1>
        <p class="entry-text">
          오늘의 하루를 영화와 함께 시작하려면<br />
          아래 버튼을 눌러 입장하세요.
        </p>
        <button id="entry-start-button" class="entry-start-button" type="button">
          입장하기
        </button>
      </div>
    </div>

    <header class="hero">
      <div class="overlay"></div>
      <nav class="navbar">
        <div id="site-logo" class="logo">Mr. MOON FLIX</div>
        <span class="nav-tag">NOW PLAYING</span>
      </nav>

      <div class="hero-layout">
        <div class="hero-content">
          <p class="eyebrow">현재 상영작</p>
          <h1 class="hero-title">
            <span class="hero-word">지금</span>
            <span class="hero-word">극장에서</span>
            <span class="hero-word">만나볼</span>
            <span class="hero-word">영화</span>
          </h1>
          <p class="hero-text">
            개봉일 기준 <span class="highlight-text">한 달 이내</span>의 상영 중인
            영화의 포스터, 제목, 개봉일을 보여줍니다.
          </p>
        </div>

        <aside class="top-rated-panel" aria-labelledby="top-rated-heading">
          <div class="panel-header">
            <p class="panel-eyebrow">추천 리스트</p>
            <h2 id="top-rated-heading">Top Rated 5</h2>
          </div>
          <div id="top-rated-list" class="top-rated-list" aria-live="polite">
            <div class="top-rated-status">탑 레이트 영화를 불러오는 중입니다...</div>
          </div>
        </aside>
      </div>
    </header>

    <main class="content">
      <section class="section-header">
        <h2>Now Playing</h2>
        <p>영화 카드를 클릭하면 TMDB 상세 페이지로 이동합니다.</p>
      </section>

      <section id="movie-grid" class="movie-grid" aria-live="polite">
        <div class="status-card">영화 목록을 불러오는 중입니다...</div>
      </section>
    </main>

    <button id="audio-toggle" class="audio-toggle" type="button">
      음악 정지
    </button>

    <audio
      id="intro-sound"
      src="./assets/cinema-paradiso-theme.mp3"
      preload="auto"
      loop
      playsinline
    ></audio>
    <script src="./script.js"></script>
  </body>
</html>
